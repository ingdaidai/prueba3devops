server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # -------------------------------------------------------
    # Reverse proxy hacia Backend Ventas
    # En ECS: Service Connect resuelve "ventas-api" por DNS
    # BACKEND_VENTAS_URL se inyecta en runtime via envsubst
    # Default: http://ventas-api:8080
    # -------------------------------------------------------
    location /api/ventas/ {
        proxy_http_version 1.1;
        proxy_pass ${BACKEND_VENTAS_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------
    # Reverse proxy hacia Backend Despachos
    # En ECS: Service Connect resuelve "despachos-api" por DNS
    # BACKEND_DESPACHOS_URL se inyecta en runtime via envsubst
    # Default: http://despachos-api:8081
    # -------------------------------------------------------
    location /api/despachos/ {
        proxy_http_version 1.1;
        proxy_pass ${BACKEND_DESPACHOS_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Servir la SPA de React (cualquier ruta no encontrada → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
