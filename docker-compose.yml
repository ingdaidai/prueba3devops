# ============================================================
# Docker Compose - Desarrollo Local
# Levanta MySQL + Backend Ventas + Backend Despachos + Frontend
# ============================================================
# Los nombres de servicio (ventas-api, despachos-api) son
# idénticos a los usados en ECS Service Connect para que nginx
# resuelva los mismos DNS tanto en local como en producción.
# ============================================================
# Uso:
#   cp .env.example .env   (editar variables si es necesario)
#   docker compose up --build
# ============================================================

services:
  # ---- Base de datos MySQL ----
  mysql:
    image: mysql:8.0
    container_name: prueba3-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend Ventas (puerto 8080) ----
  # Nombre: ventas-api → mismo que en ECS Service Connect
  ventas-api:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: prueba3-ventas
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ---- Backend Despachos (puerto 8081) ----
  # Nombre: despachos-api → mismo que en ECS Service Connect
  despachos-api:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: prueba3-despachos
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ---- Frontend (puerto 3000 → 80 interno Nginx) ----
  # nginx proxea /api/ventas/ → ventas-api:8080
  #             /api/despachos/ → despachos-api:8081
  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: prueba3-frontend
    ports:
      - "3000:80"
    environment:
      # URLs por defecto — coinciden con los nombres de servicio de este compose
      BACKEND_VENTAS_URL: http://ventas-api:8080
      BACKEND_DESPACHOS_URL: http://despachos-api:8081
    depends_on:
      - ventas-api
      - despachos-api
    restart: unless-stopped

volumes:
  mysql_data:
