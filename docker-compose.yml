# ============================================================
# Docker Compose - Desarrollo Local
# Levanta MySQL + Backend Ventas + Backend Despachos + Frontend
# ============================================================
# Uso:
#   cp .env.example .env   (editar variables si es necesario)
#   docker compose up --build
# ============================================================

services:
  # ---- Base de datos MySQL ----
  mysql:
    image: mysql:8.0
    container_name: prueba3-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend Ventas (puerto 8080) ----
  backend-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: prueba3-ventas
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ---- Backend Despachos (puerto 8081) ----
  backend-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: prueba3-despachos
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ---- Frontend (puerto 3000 -> 80 interno Nginx) ----
  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: prueba3-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend-ventas
      - backend-despachos
    restart: unless-stopped

volumes:
  mysql_data:
